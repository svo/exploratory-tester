- name: Install Claude Code
  community.general.npm:
    name: '@anthropic-ai/claude-code'
    global: true
  become: true

- name: Install CLI tools to assist Claude Code
  ansible.builtin.apt:
    name:
      - jq
      - ripgrep
      - fd-find
      - tree
    state: present
  become: true

- name: Ensure apt keyrings directory exists for GitHub CLI
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add GitHub CLI apt keyring
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  become: true

- name: Resolve Debian package architecture for GitHub CLI
  ansible.builtin.set_fact:
    claude_code_gh_deb_arch: "{{ ansible_facts['architecture'] | regex_replace('^x86_64$', 'amd64') | regex_replace('^aarch64$', 'arm64') }}"

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: 'deb [arch={{ claude_code_gh_deb_arch }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main'
    filename: github-cli
    state: present
    update_cache: true
  become: true

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
  become: true
