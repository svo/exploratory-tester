- name: Install Playwright MCP
  community.general.npm:
    name: '@playwright/mcp'
    global: true
  become: true

- name: Install Playwright browser and system dependencies via global package
  ansible.builtin.shell: |
    cd /usr/lib/node_modules/@playwright/mcp && npx playwright install --with-deps chromium
  become: true

- name: Create Playwright MCP config directory
  ansible.builtin.file:
    path: /etc/playwright-mcp
    state: directory
    mode: '0755'
  become: true

- name: Deploy Playwright MCP config
  ansible.builtin.copy:
    src: config.json
    dest: /etc/playwright-mcp/config.json
    mode: '0644'
  become: true

- name: Deploy entrypoint script
  ansible.builtin.copy:
    src: entrypoint.sh
    dest: /usr/local/bin/entrypoint.sh
    mode: '0755'
  become: true

- name: Create workspace directory
  ansible.builtin.file:
    path: /workspace
    state: directory
    mode: '0755'
  become: true

- name: Deploy CLAUDE.md
  ansible.builtin.copy:
    src: CLAUDE.md
    dest: /workspace/CLAUDE.md
    mode: '0644'
  become: true

- name: Create workspace .claude directory
  ansible.builtin.file:
    path: /workspace/.claude
    state: directory
    mode: '0755'
  become: true

- name: Deploy Claude Code settings
  ansible.builtin.copy:
    src: settings.json
    dest: /workspace/.claude/settings.json
    mode: '0644'
  become: true

- name: Deploy MCP server configuration for Claude Code
  ansible.builtin.copy:
    src: mcp.json
    dest: /workspace/.mcp.json
    mode: '0644'
  become: true

- name: Create Rovo Dev config directory
  ansible.builtin.file:
    path: /root/.rovodev
    state: directory
    mode: '0755'
  become: true

